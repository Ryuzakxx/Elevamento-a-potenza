<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevamento a potenza</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="container_frase"></div>
    <div class="container_potenza"></div>
    <p class="frase">Elevamento a potenza avendo base ed esponente</p>
    <p class="base_testo">Inserisci la base</p>
    <input type="base" id="base" name="base">
    <p class="esponente_testo">Inserisci l'esponente</p>
    <input type="esponente" id="esponente" name="esponente">
    <p class="risultato_testo">Risultato</p>
    <input type="risultato" id="risultato" name="risultato">
    <button class="calcola" onclick="calcolaPotenza()">Calcola</button>
</body>
</html>
